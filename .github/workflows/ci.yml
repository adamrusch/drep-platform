# CI: typecheck + tests + cdk synth across all three workspaces.
#
# Why it exists (2026-05-26):
#   PRs #1 and #2 both shipped before any CI existed. The cdk.out race
#   that bit us on PR #2's deploy could have been caught earlier if a
#   `cdk synth --all` step had been a required check: synth wouldn't
#   have prevented the runtime race, but a routine `npm test` + synth
#   in CI catches the typo-shaped class of bugs (broken imports, wrong
#   types) that have been slipping through review.
#
# Matrix strategy:
#   Three workspaces run in parallel as separate jobs (not a `strategy
#   matrix`) so each job gets its own `~/.npm` cache key and the failure
#   surface stays per-workspace. End-to-end wall time = max(backend,
#   frontend, infra) ~= ~3 min instead of ~7 min serial.
#
# Required-check setup (manual, after first green run):
#   Settings → Branches → main → Branch protection rule → "Require
#   status checks to pass before merging" → add `ci / backend`,
#   `ci / frontend`, `ci / infra`. See scripts/README.md for the full
#   ritual.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands.
# Saves CI minutes; the latest commit is the only one that matters for
# merge-eligibility.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 matches the Lambda runtime (`lambda.Runtime.NODEJS_20_X`
          # in infra/lib/api-stack.ts + scheduler-stack.ts) and the engine
          # used to bundle Lambdas locally. Bumping this needs a coordinated
          # CDK runtime change.
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Lint gate (Biome; noUnused* as errors). Widened repo-wide on
      # chore/repo-wide-lint — covers the full src/ tree. See
      # backend/biome.json.
      - run: npm run lint
      # Supply-chain gate: fail on high-severity advisories in prod deps.
      - run: npm run audit:prod
      - run: npm test

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Lint gate (Biome; noUnused* as errors). Mirrors the backend job —
      # widened repo-wide on chore/repo-wide-lint. See frontend/biome.json.
      - run: npm run lint
      # Unit tests (vitest + RTL canaries — Batch F #18). Runs ahead of
      # the build so a failing test doesn't waste the 5-min Vite bundle
      # step. New tests are co-located as `*.test.{ts,tsx}` next to the
      # component under test.
      - run: npm test
      # `npm run build` runs `tsc && vite build` — typecheck is redundant
      # but cheap, and keeps the log structure parallel to the backend
      # job. Vite build is the meaningful guard: it catches missing
      # imports + bundler-time failures the typecheck alone misses.
      #
      # NODE_OPTIONS=--max-old-space-size=6144 bumps the Node heap to 6GB
      # so Vite + the SWC native plugin can bundle the Mesh/Cardano libs
      # (WalletButton chunk is ~6.5MB pre-gzip — heavy enough to OOM the
      # default 7GB GitHub runner with Node's ~4GB default heap).
      - run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

  infra:
    name: infra
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json
      # `cdk synth` bundles every Lambda — esbuild needs to find the
      # backend handler sources AND install the Lambda runtime deps
      # (cardano-serialization-lib-nodejs, blake2b, etc.) listed under
      # `nodeModules: [...]` in the bundling config. So we install the
      # backend deps too.
      - name: Install backend dependencies (needed by Lambda bundling)
        working-directory: backend
        run: npm ci
      - run: npm ci
      - run: npm run typecheck
      # Lint gate (Biome; noUnused* as errors). Mirrors the backend job —
      # widened repo-wide on chore/repo-wide-lint. See infra/biome.json.
      - run: npm run lint
      # `cdk synth --all` runs the full app and produces every stack's
      # template + every Lambda's bundled asset. This is the load-
      # bearing check — it catches CFN-invalid changes and broken
      # Lambda imports that wouldn't show up in tsc alone.
      - name: cdk synth --all
        run: npx cdk synth --context stage=dev --all --quiet
